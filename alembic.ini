[alembic]
script_location = app/db/migrations
prepend_sys_path = .
version_path_separator = os

# 异步数据库 URL
sqlalchemy.url = postgresql+asyncpg://pixelmind:password@localhost:5432/pixelmind

[post_write_hooks]
# ruff 格式化迁移文件
hooks = ruff
ruff.type = exec
ruff.entrypoint = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
