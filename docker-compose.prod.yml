version: '3.8'

services:
  # PostgreSQL 数据库 - 生产配置
  postgres:
    image: postgres:16-alpine
    container_name: pixel_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-pixel_db}
      POSTGRES_INITDB_ARGS: "-c max_connections=200 -c shared_buffers=256MB -c effective_cache_size=1GB -c maintenance_work_mem=64MB -c work_mem=256KB"
    ports:
      - "127.0.0.1:5432:5432"  # 仅允许本地连接
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./app/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - pixel_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis 缓存和队列 - 生产配置
  redis:
    image: redis:7-alpine
    container_name: pixel_redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"  # 仅允许本地连接
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - pixel_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # FastAPI 应用
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pixel_api
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-changeme}@postgres:5432/${DB_NAME:-pixel_db}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
      # 额外的生产环境变量（从 .env.production 读取）
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_S3_REGION: ${AWS_S3_REGION}
      SENTRY_DSN: ${SENTRY_DSN}
      LOG_LEVEL: info
    ports:
      - "127.0.0.1:8000:8000"  # 仅允许本地连接（Nginx 转发）
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs  # 应用日志持久化
    networks:
      - pixel_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Celery Worker - 处理后台任务（图片生成等）
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pixel_celery_worker
    restart: always
    command: celery -A app.core.task_queue.celery_app worker --queues image --concurrency=4 --loglevel=info
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-changeme}@postgres:5432/${DB_NAME:-pixel_db}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_S3_REGION: ${AWS_S3_REGION}
      SENTRY_DSN: ${SENTRY_DSN}
      LOG_LEVEL: info
    depends_on:
      - postgres
      - redis
    volumes:
      - ./logs:/app/logs
    networks:
      - pixel_network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Celery Flower - 监控面板
  celery_flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pixel_flower
    restart: always
    command: celery -A app.core.task_queue.celery_app flower --port=5555 --broker=redis://redis:6379/0
    ports:
      - "127.0.0.1:5555:5555"  # 仅允许本地连接（可选 Nginx 暴露）
    depends_on:
      - redis
    networks:
      - pixel_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: pixel_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro  # SSL 证书
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - api
    networks:
      - pixel_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  pixel_network:
    driver: bridge
