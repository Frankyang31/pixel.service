# Nginx 反向代理配置 - 适用于 118.25.22.37

upstream api {
    server api:8000;
}

upstream flower {
    server celery_flower:5555;
}

# HTTP 重定向到 HTTPS（可选，取决于是否配置 SSL）
server {
    listen 80;
    server_name 118.25.22.37;

    # 健康检查端点（给腾讯云监控）
    location /health {
        access_log off;
        return 200 "OK";
    }

    # 其他请求重定向到 HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS 主服务（需配置 SSL 证书）
server {
    listen 443 ssl http2;
    server_name 118.25.22.37;

    # SSL 证书配置（自签或 Let's Encrypt）
    # ssl_certificate /etc/nginx/ssl/cert.pem;
    # ssl_certificate_key /etc/nginx/ssl/key.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
    # ssl_prefer_server_ciphers on;

    # 日志
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # 增加请求体大小限制（支持大文件上传）
    client_max_body_size 50M;

    # 反向代理到 FastAPI
    location / {
        proxy_pass http://api;
        proxy_http_version 1.1;
        
        # 保留原始请求信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 缓冲配置
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # SSE（Server-Sent Events）支持 - 用于实时任务状态推送
    location /api/v1/tasks/stream {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # SSE 特殊配置
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        
        # 关键：设置读超时为较长时间（SSE 连接保持开放）
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Celery Flower 监控面板（可选）
    location /flower/ {
        proxy_pass http://flower/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 健康检查端点
    location /health {
        access_log off;
        return 200 "OK";
    }

    # 静态文件缓存优化（如果有）
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://api;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 安全头配置
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # GZIP 压缩
    gzip on;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;
    gzip_min_length 1000;
    gzip_disable "msie6";
}
